[pytest]
# Pytest 配置

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may call external APIs, slower)
    e2e: End-to-end tests (full pipeline tests)
    slow: Slow running tests

# 預設測試路徑
testpaths = tests

# Python 路徑設定
pythonpath = .

# 輸出設定
addopts =
    -v
    --strict-markers
    --tb=short

# Asyncio 設定
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
