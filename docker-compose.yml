services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: ai-doc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_doc_demo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-doc-network

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-doc-backend
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_doc_demo

      # AWS S3
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-ap-northeast-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_CDN_URL: ${S3_CDN_URL:-}

      # Storage
      STORAGE_TYPE: ${STORAGE_TYPE:-s3}

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_MODEL_MINI: ${OPENAI_MODEL_MINI:-gpt-4o-mini}

      # AWS Textract
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}

      # OCR Service
      OCR_SERVICE: ${OCR_SERVICE:-pytesseract}

      # CORS
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:8085","http://localhost:3000"]}'

      # App
      DEBUG: "true"
      LOG_LEVEL: "INFO"
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/venv  # Exclude venv from mount
      - ./uploads:/app/uploads  # Mount for local file storage
      - ./data:/data  # Mount test data directory
    networks:
      - ai-doc-network
    command: >
      sh -c "
        echo 'Waiting for postgres...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
      "

  # Frontend - Vue 3 + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-doc-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend:8000}
    depends_on:
      - backend
    networks:
      - ai-doc-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ai-doc-nginx
    ports:
      - "8085:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ai-doc-network

volumes:
  postgres_data:
    driver: local

networks:
  ai-doc-network:
    driver: bridge
